    <style>

        * {

            height: auto;
        }

        body {
            margin: 0;

            font-size: 15px;
            font-style: italic;
            color: white;
            list-style: none;
        }

        .a-element:hover {
            background-color: rgb(93, 11, 11);
        }

        .nav-body {
            color: white;
            justify-content: center;
            text-align: center;
            padding-top: 80px;
        }

        .heading {
            color: gold;
            font-size: 50px;
            letter-spacing: 2px;
        }

        p {
            font-size: 20px;
            font-family: "Grey Qo", cursive;
