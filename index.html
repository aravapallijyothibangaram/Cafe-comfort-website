<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Comfort</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playwrite+AR:wght@100..400&family=Grey+Qo&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url("https://wallpaperaccess.com/full/1076709.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            position: relative;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            position: relative;
            z-index: 2;
        }

        .nav-logo {
            font-family: "Playwrite AR", cursive;
            font-size: 35px;
            color: white;
            filter: drop-shadow(3px 6px 4px gold);
        }

        .navbar-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .navbar-right a {
            text-decoration: none;
        }

        .a-element {
            padding: 8px 14px;
            border-radius: 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
            font-size: 15px;
            font-style: italic;
            color: white;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .a-element:hover {
            background-color: rgb(93, 11, 11);
            transform: scale(1.05);
        }

        /* CENTER TEXT EXACTLY IN MIDDLE */
        .nav-body {
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 2;
            width: 90%;
        }

        .heading {
            color: gold;
            font-size: clamp(55px, 8vw, 80px);
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .tagline {
            font-size: clamp(22px, 3vw, 32px);
            font-family: "Grey Qo", cursive;
            font-weight: 400;
            line-height: 1.8;
            margin-top: 20px;
            text-shadow: 2px 2px 6px black;
        }

        /* Tablet */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }

            .navbar-right {
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-body {
                top: 50%;
            }

            .heading {
                font-size: clamp(42px, 7vw, 60px);
            }

            .tagline {
                font-size: clamp(18px, 3vw, 24px);
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .nav-logo {
                font-size: 28px;
            }

            .a-element {
                font-size: 13px;
                padding: 6px 10px;
            }

            .nav-body {
                top: 50%;
                width: 95%;
            }

            .heading {
                font-size: 38px;
                margin-bottom: 12px;
            }

            .tagline {
                font-size: 18px;
                line-height: 1.6;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>
    <section class="navbar">
        <h1 class="nav-logo">Cafe <span style="color: gold;">Comfort</span></h1>

        <div class="navbar-right">
            <a class="a-element" href="index.html">HOME</a>
            <a class="a-element" href="about.html">ABOUT</a>
            <a class="a-element" href="cards.html">MENU</a>
            <a class="a-element" href="fotter.html">CONTACT US</a>
        </div>
    </section>

    <div class="nav-body">
        <h1 class="heading">Coffee</h1>
        <p class="tagline">
            A Magical, <br />
            Dark Liquid That Helps You Get Through The Day
        </p>
    </div>
</body>

</html>
